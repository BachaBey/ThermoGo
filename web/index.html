<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />

    <!--
      IMPORTANT: viewport — user-scalable=no prevents double-tap zoom on iOS
      making it feel like a real native app
    -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no, user-scalable=no, viewport-fit=cover"
    />

    <!-- PWA meta tags -->
    <meta name="application-name"   content="ThermoGo" />
    <meta name="apple-mobile-web-app-capable"           content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style"  content="black-translucent" />
    <meta name="apple-mobile-web-app-title"             content="ThermoGo" />
    <meta name="mobile-web-app-capable"                 content="yes" />
    <meta name="theme-color"                            content="#3b82f6" />
    <meta name="description"                            content="Monitor your temperature and humidity sensors in real time." />

    <!-- App icons — iOS requires these specific apple-touch-icon tags -->
    <link rel="apple-touch-icon"              href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icons/icon-192.png" />

    <!-- Standard favicon -->
    <link rel="icon" type="image/png" sizes="32x32"  href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />

    <!-- PWA Manifest (Android home screen icon + app name) -->
    <link rel="manifest" href="/manifest.json" />

    <title>ThermoGo</title>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
